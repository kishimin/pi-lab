name: Frontend CI

on: ["push", "pull_request"]

permissions:
  contents: read
  pull-requests: write

jobs:
  install:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Cache node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Install dependencies
        if: steps.node_modules_cache.outputs.cache-hit != 'true'
        run: npm ci

  check:
    needs: install

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Run Type Check
        run: npm run typecheck

      - name: Run Lint
        run: npm run lint

  unit-test:
    needs: install

    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-node@v3
        with:
          node-version: 22

      - name: Restore node_modules
        uses: actions/cache@v3
        id: node_modules_cache
        with:
          path: node_modules
          key: ${{ runner.os }}-${{ hashFiles('package-lock.json') }}

      - name: Vitest unit test
        run: npx vitest run

      - name: "Report Vitest Result"
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require("fs");

            // The following code ensures this function is not triggered except via a pull request.
            // I suspect this might become unnecessary when combined with if: always(), but let's leave it like this for now.
            if (!context.payload.pull_request) {
              console.log("Not running on a pull request.");
              process.exit(0);
            }

            const TEST_RESULT_PATH = "test-result.json";

            if (!fs.existsSync(TEST_RESULT_PATH)) {
              console.log(`Test result file not found at ${TEST_RESULT_PATH}.`);
              process.exit(1);
            }

            // Load the Vitest output file.
            const result = JSON.parse(fs.readFileSync(TEST_RESULT_PATH, "utf8"));

            if (result.numTotalTests === 0) {
              console.log("No test case.");
              process.exit(1);
            }

            const runLink = `${process.env.GITHUB_SERVER_URL || "https://github.com"}/${context.repo.owner}/${context.repo.repo}/actions/runs/${process.env.GITHUB_RUN_ID}`;

            // I'll summarize the Vitest results as comments on the pull request.
            const body = `
            # Test Results\n
            **${result.success ? "All Tests Successful" : "There are some failed tests"}**\n
            \n
            ## Test suites\n
            - Total: ${result.numTotalTestSuites} 件
              - Pass: ${result.numPassedTestSuites} 件
              - Failure: ${result.numFailedTestSuites} 件
              - Hold: ${result.numPendingTestSuites} 件
            \n
            ## Test cases\n
            - :Total ${result.numTotalTests} 件
              - Pass: ${result.numPassedTests} 件
              - Failure: ${result.numFailedTests} 件
              - Hold: ${result.numPendingTests} 件
            \n
            ## Full Report Link\n
            (Actions run): ${runLink}\n
            \n
            _Generated by workflow ${process.env.GITHUB_WORKFLOW || ""}_
            `;

            // Write the summary comment (body) to the pull request.
            await github.rest.issues.createComment({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number: context.payload.pull_request.number,
              body,
            });
